<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stage AI Labs</title>
    <style>
      :root {
        color-scheme: dark;
        --blue: #3785ff;
        --cyan: #5cddff;
        --ink: #05080e;
        --panel: rgba(15, 24, 41, 0.76);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 31%, rgba(41, 112, 255, 0.27), transparent 24rem),
          radial-gradient(circle at 85% 86%, rgba(52, 225, 255, 0.12), transparent 19rem),
          var(--ink);
        color: #f5f8ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .grid {
        position: fixed;
        inset: 0;
        opacity: 0.3;
        background-image:
          linear-gradient(rgba(111, 159, 255, 0.09) 1px, transparent 1px),
          linear-gradient(90deg, rgba(111, 159, 255, 0.09) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(circle at center, black, transparent 75%);
      }

      .orb {
        position: absolute;
        width: 420px;
        height: 420px;
        top: 50%;
        left: 50%;
        border: 1px solid rgba(104, 177, 255, 0.18);
        border-radius: 50%;
        transform: translate(-50%, -48%);
        box-shadow: 0 0 120px rgba(54, 139, 255, 0.12), inset 0 0 75px rgba(77, 169, 255, 0.06);
        animation: breathe 3.8s ease-in-out infinite;
      }

      .orb::before,
      .orb::after {
        position: absolute;
        inset: 22px;
        border: 1px solid rgba(102, 183, 255, 0.11);
        border-radius: inherit;
        content: "";
      }

      .orb::after { inset: 54px; }

      main {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 30px;
        letter-spacing: 0.23em;
        font-size: 12px;
        font-weight: 700;
        color: #a9caff;
      }

      .mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid rgba(130, 188, 255, 0.6);
        border-radius: 10px;
        box-shadow: 0 0 28px rgba(67, 143, 255, 0.34);
        color: white;
        font-size: 16px;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 6vw, 86px);
        font-weight: 750;
        letter-spacing: -0.07em;
        line-height: 0.94;
        text-align: center;
        text-shadow: 0 0 35px rgba(106, 171, 255, 0.23);
      }

      h1 span {
        display: block;
        margin-top: 12px;
        color: #80b7ff;
        font-size: 0.26em;
        letter-spacing: 0.38em;
      }

      p {
        max-width: 430px;
        margin: 30px 24px 0;
        color: #9aabc5;
        font-size: 14px;
        letter-spacing: 0.04em;
        line-height: 1.6;
        text-align: center;
      }

      .launch {
        position: absolute;
        bottom: 10vh;
        width: min(480px, calc(100vw - 48px));
      }

      .launch-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        color: #91a9cc;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .track {
        position: relative;
        height: 8px;
        overflow: visible;
        border: 1px solid rgba(120, 165, 255, 0.22);
        border-radius: 999px;
        background: rgba(5, 12, 23, 0.9);
        box-shadow: inset 0 0 14px rgba(23, 69, 149, 0.32);
      }

      .fuel {
        position: absolute;
        inset: 1px auto 1px 1px;
        width: 68%;
        border-radius: inherit;
        background: linear-gradient(90deg, #2876ef, var(--cyan));
        box-shadow: 0 0 18px rgba(81, 194, 255, 0.8);
        animation: charge 2.4s ease-in-out infinite;
      }

      .rocket {
        position: absolute;
        top: 50%;
        left: 66%;
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid rgba(175, 222, 255, 0.68);
        border-radius: 50%;
        background: var(--panel);
        box-shadow: 0 0 28px rgba(70, 180, 255, 0.75);
        font-size: 18px;
        transform: translate(-50%, -50%) rotate(45deg);
        animation: rocket 2.4s ease-in-out infinite;
      }

      .rocket span { transform: rotate(-45deg); }

      @keyframes breathe {
        50% { box-shadow: 0 0 155px rgba(54, 139, 255, 0.23), inset 0 0 90px rgba(77, 169, 255, 0.11); }
      }

      @keyframes charge {
        50% { width: 91%; opacity: 0.88; }
      }

      @keyframes rocket {
        50% { left: 89%; transform: translate(-50%, -54%) rotate(45deg) scale(1.08); }
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="orb"></div>
    <main>
      <div class="brand"><span class="mark">SA</span> STAGE AI LABS</div>
      <h1>Owner Console<span>intelligence in motion</span></h1>
      <p>Preparando tu centro de operaciones privado, conexiones y automatizaciones.</p>
      <section class="launch" aria-label="Cargando Stage AI Labs">
        <div class="launch-meta"><span>Inicializando sistemas</span><span>Conectando</span></div>
        <div class="track"><div class="fuel"></div><div class="rocket"><span>🚀</span></div></div>
      </section>
    </main>
  </body>
</html>
